接近口語，為唐詩中別開生面之作。</div></section><!--[--><!--]--></div></div></div><!-- 橫排模式才顯示浮動設定鈕 --><!----><!-- About overlay (only if about content is configured) --><div aria-live="polite" aria-atomic="true" class="sr-only"></div><!--teleport start--><!--teleport end--></div></div></body></html>
