">牝<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">。<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">玄<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">牝<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">之<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">門<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">，<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">是<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">謂<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">天<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">地<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">根<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">。<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">緜<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">緜<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">若<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">存<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">，<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">用<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">之<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">不<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">勤<rp></rp><rp></rp></ruby><ruby class="ann-target commentary" data-ann-ids="wangbi-1">。<rp></rp><rp></rp></ruby></span><!--]--></div></div></section><div class="sb-root sb-vertical v-section v-indent-1" data-section-key="annotations" data-v-e85b722d="" data-v-e3ce7dff=""><div class="sb-toggleable sb-on sb-header" data-v-e3ce7dff=""><!----><button class="sb-title sb-toggle sb-active" data-v-e3ce7dff="">注釋</button><!--[--><div class="v-layer-toggles" data-v-e85b722d=""><!--[--><button class="active v-layer-btn" title="王弼註" data-v-e85b722d="">王</button><!--]--></div><!--]--></div><div class="sb-text" data-v-e3ce7dff=""></div></div><!--[--><div class="sb-root sb-vertical v-section" data-v-e85b722d="" data-v-e3ce7dff=""><div class="sb-header" data-v-e3ce7dff=""><!----><h3 class="sb-title" data-v-e3ce7dff="">王弼註</h3><!--[--><!--]--></div><div class="sb-text sb-ann-list" data-v-e3ce7dff=""><!--[--><div class="ape ape--vertical" data-v-e3ce7dff="" data-v-0ab03b29=""><div class="ape-head" data-v-0ab03b29=""><span class="ape-num" data-v-0ab03b29="">一</span><span class="ape-term" data-v-0ab03b29="">神不死，是謂玄牝。玄牝之門，是謂天地根。緜緜若存，用之不勤。</span><!--[--><!--]--></div><div class="ape-def" data-v-0ab03b29="">神，谷中央無谷也。無形無影，無逆無違，處卑不動，守靜不衰，谷以之成而不見其形，此至物也。處卑而不可得名，故謂天地之根，緜緜若存，用之不 勤。門，玄牝之所由也，本其所由，與極同體，故謂之天地之根也。欲言存邪，則不見其形，欲言亡邪，萬物以之生。故緜緜若存也，無物不成，用而不勞也。故曰，用而不勤也。</div></div><!--]--></div></div><!--]--><!--[--><!--]--><nav class="v-nav" aria-label="piece navigation" data-v-e85b722d=""><button class="v-nav-btn" aria-label="上一篇" data-v-e85b722d=""><span class="v-nav-dir" data-v-e85b722d="">▲</span><span class="v-nav-title" data-v-e85b722d="">第五章</span></button><button class="v-nav-btn" aria-label="下一篇" data-v-e85b722d=""><span class="v-nav-dir" data-v-e85b722d="">▼</span><span class="v-nav-title" data-v-e85b722d="">第七章</span></button></nav></div><!----><!--teleport start--><!--teleport end--><!----><!-- 底部浮動段落導航列 --><nav class="v-section-bar" aria-label="section navigation" data-v-e85b722d=""><!--[--><button class="v-sec-item" title="正文" data-v-e85b722d="">文</button><button class="v-sec-item" title="注釋" data-v-e85b722d="">注</button><!--]--></nav><!-- 右側 TOC 條 + 麵包屑 --><button class="v-toc-s
