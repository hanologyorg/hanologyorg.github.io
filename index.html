<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>積累與感興 — 古詩文誦讀材料選編</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --ink: #1a1a1a;
  --ink-mid: #4a3f35;
  --ink-light: #7a6e5f;
  --ink-faint: #a89b8a;
  --paper: #faf6ee;
  --paper-warm: #f5f0e5;
  --paper-deep: #ebe4d4;
  --vermillion: #c23a2b;
  --vermillion-light: #d4554a;
  --gold: #9a7d3a;
  --gold-light: #c9a84c;
  --jade: #3a6b5e;
  --border: #d8cdb8;
  --border-light: #e8e0d0;
  --shadow-sm: 0 1px 3px rgba(26,26,26,0.06);
  --shadow-md: 0 4px 16px rgba(26,26,26,0.08);
  --shadow-lg: 0 12px 40px rgba(26,26,26,0.12);
  --shadow-xl: 0 24px 64px rgba(26,26,26,0.16);
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --serif: 'Noto Serif TC', '宋體-繁', 'PMingLiU', serif;
  --sans: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  --reading-w: min(680px, calc(100vw - 80px));
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--serif);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.8;
  min-height: 100vh;
  overflow-x: hidden;
}

::selection { background: var(--vermillion); color: #fff; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

/* ===== HERO ===== */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23d8cdb8' stroke-width='.3' fill='none'/%3E%3C/svg%3E") repeat;
  opacity: 0.3;
  pointer-events: none;
}

.hero-content {
  position: relative;
  text-align: center;
  z-index: 1;
}

.hero-ornament {
  font-size: 48px;
  color: var(--vermillion);
  opacity: 0.6;
  letter-spacing: 20px;
  margin-bottom: 32px;
}

.hero-title {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 900;
  letter-spacing: 12px;
  color: var(--ink);
  margin-bottom: 12px;
  writing-mode: horizontal-tb;
}

.hero-subtitle {
  font-size: clamp(14px, 2vw, 18px);
  font-weight: 300;
  color: var(--ink-light);
  letter-spacing: 6px;
  margin-bottom: 48px;
  font-family: var(--sans);
}

.hero-divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 48px;
}

.hero-stats {
  display: flex;
  gap: 48px;
  justify-content: center;
  margin-bottom: 48px;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 36px;
  font-weight: 200;
  color: var(--ink);
  letter-spacing: 2px;
}

.hero-stat-label {
  font-size: 12px;
  color: var(--ink-faint);
  letter-spacing: 4px;
  font-family: var(--sans);
  text-transform: uppercase;
  margin-top: 4px;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 14px 40px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 3px;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.3s var(--ease);
}

.hero-cta:hover {
  background: var(--vermillion);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.hero-scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--ink-faint);
  font-size: 11px;
  font-family: var(--sans);
  letter-spacing: 3px;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}

/* ===== CATALOG ===== */
.catalog {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 40px;
}

.catalog-header {
  text-align: center;
  margin-bottom: 60px;
}

.catalog-header h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--ink);
  margin-bottom: 8px;
}

.catalog-header .line {
  width: 60px;
  height: 2px;
  background: var(--vermillion);
  margin: 16px auto;
}

.catalog-header p {
  font-size: 14px;
  color: var(--ink-faint);
  font-family: var(--sans);
  letter-spacing: 2px;
}

/* Filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.filter-search {
  padding: 10px 20px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: #fff;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  width: 280px;
  outline: none;
  transition: border-color 0.2s;
}

.filter-search:focus {
  border-color: var(--gold);
}

.filter-search::placeholder {
  color: var(--ink-faint);
}

/* Grid */
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.poem-card {
  position: relative;
  background: #fff;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  overflow: hidden;
}

.poem-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 0;
  background: var(--vermillion);
  transition: height 0.3s var(--ease);
}

.poem-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--gold-light);
}

.poem-card:hover::before {
  height: 100%;
}

.poem-card .card-num {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-faint);
  font-family: var(--sans);
  margin-bottom: 8px;
}

.poem-card .card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.poem-card .card-author {
  font-size: 13px;
  color: var(--ink-light);
  font-family: var(--sans);
  letter-spacing: 1px;
}

.poem-card .card-preview {
  font-size: 13px;
  color: var(--ink-faint);
  margin-top: 12px;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ===== POEM DETAIL VIEW ===== */
.detail-view {
  display: none;
  min-height: 100vh;
}

.detail-view.active { display: block; }

.detail-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 246, 238, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-light);
  padding: 0 40px;
}

.detail-nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  height: 56px;
  gap: 16px;
}

.nav-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: none;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-mid);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.nav-back:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.nav-breadcrumb {
  font-size: 15px;
  color: var(--ink);
  font-weight: 600;
  letter-spacing: 1px;
}

.nav-breadcrumb .sep {
  color: var(--ink-faint);
  font-weight: 300;
  margin: 0 8px;
}

.nav-breadcrumb .author-name {
  color: var(--ink-light);
  font-weight: 400;
}

.nav-controls {
  margin-left: auto;
  display: flex;
  gap: 6px;
}

.nav-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: none;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-light);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}

.nav-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.nav-btn:hover:not(.active) {
  border-color: var(--ink);
  color: var(--ink);
}

/* ===== POEM READING AREA ===== */
.reading-area {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 40px;
}

/* Vertical poem scroll */
.poem-scroll-section {
  margin-bottom: 60px;
  display: flex;
  justify-content: center;
}

.poem-scroll-section.hidden { display: none; }

.vertical-scroll {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  height: clamp(400px, 60vh, 560px);
  overflow-x: auto;
  overflow-y: hidden;
  padding: 32px 24px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) var(--paper);
}

.vertical-scroll::-webkit-scrollbar { height: 4px; }
.vertical-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

.vs-title {
  font-size: 36px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: 12px;
  margin-left: 24px;
  padding-left: 24px;
  border-left: 3px solid var(--vermillion);
  line-height: 1.6;
}

.vs-author {
  font-size: 22px;
  font-weight: 400;
  color: var(--ink-light);
  margin-left: 16px;
  padding-left: 16px;
  letter-spacing: 6px;
}

.vs-body {
  margin-left: 28px;
}

.vs-line {
  font-size: 30px;
  line-height: 2.4;
  letter-spacing: 8px;
  color: var(--ink);
  display: block;
}

.vs-line .fn-ref {
  font-size: 14px;
  color: var(--vermillion);
  font-weight: 500;
  vertical-align: super;
  cursor: pointer;
  transition: color 0.15s;
}

.vs-line .fn-ref:hover {
  color: var(--vermillion-light);
}

/* Seal stamp */
.seal-stamp {
  position: absolute;
  bottom: 16px;
  left: 16px;
  width: 44px;
  height: 44px;
  border: 2px solid var(--vermillion);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  writing-mode: vertical-rl;
  font-size: 14px;
  font-weight: 900;
  color: var(--vermillion);
  opacity: 0.5;
  letter-spacing: 2px;
}

/* Horizontal view */
.horizontal-section {
  display: none;
  margin-bottom: 60px;
  text-align: center;
}

.horizontal-section.active { display: block; }

.horiz-poem-block {
  display: inline-block;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 40px 56px;
  box-shadow: var(--shadow-md);
}

.horiz-poem-block .hp-title {
  font-size: 32px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: 6px;
  margin-bottom: 6px;
}

.horiz-poem-block .hp-author {
  font-size: 16px;
  color: var(--ink-light);
  margin-bottom: 24px;
  letter-spacing: 3px;
}

.horiz-poem-block .hp-line {
  font-size: 24px;
  line-height: 2.6;
  letter-spacing: 4px;
  color: var(--ink);
}

.horiz-poem-block .hp-line .fn-ref {
  font-size: 12px;
  color: var(--vermillion);
  vertical-align: super;
  cursor: pointer;
}

/* ===== CONTENT SECTIONS ===== */
.content-sections {
  max-width: var(--reading-w);
  margin: 0 auto;
  padding-bottom: 80px;
}

.content-block {
  margin-bottom: 40px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.5s var(--ease-out) forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.content-block-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.content-block-header .cb-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--vermillion);
  color: #fff;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.content-block-header h3 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--ink);
}

.content-block-header .cb-special {
  background: var(--jade);
}

.content-text {
  font-size: 16px;
  line-height: 2.2;
  color: var(--ink-mid);
  text-align: justify;
}

.content-text p {
  margin-bottom: 16px;
  text-indent: 2em;
}

.content-text p:last-child { margin-bottom: 0; }

/* Annotation styling */
.annotation-entry {
  margin-bottom: 16px;
  padding-left: 2em;
  text-indent: -2em;
}

.annotation-entry .ann-num {
  color: var(--vermillion);
  font-weight: 600;
  margin-right: 4px;
}

.annotation-entry .ann-term {
  font-weight: 600;
  color: var(--ink);
}

.annotation-entry .ann-pron {
  color: var(--ink-faint);
  font-size: 14px;
}

.annotation-entry .ann-def {
  color: var(--ink-mid);
}

/* ===== FOOTNOTE TOOLTIP ===== */
.fn-tooltip {
  position: fixed;
  max-width: 360px;
  padding: 16px 20px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-xl);
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink-mid);
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s var(--ease);
}

.fn-tooltip.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.fn-tooltip .fn-num {
  color: var(--vermillion);
  font-weight: 700;
  margin-right: 4px;
}

/* ===== NAVIGATION BETWEEN POEMS ===== */
.poem-nav-bottom {
  max-width: var(--reading-w);
  margin: 0 auto 60px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
}

.poem-nav-btn {
  flex: 1;
  padding: 16px 24px;
  background: #fff;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s var(--ease);
  font-family: var(--serif);
}

.poem-nav-btn:hover {
  border-color: var(--gold);
  box-shadow: var(--shadow-md);
}

.poem-nav-btn .pn-label {
  font-size: 11px;
  color: var(--ink-faint);
  font-family: var(--sans);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.poem-nav-btn .pn-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 1px;
}

.poem-nav-btn.next { text-align: right; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero-stats { gap: 24px; }
  .hero-stat-num { font-size: 28px; }
  .catalog { padding: 40px 20px; }
  .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .poem-card { padding: 16px; }
  .poem-card .card-title { font-size: 17px; }
  .reading-area { padding: 30px 20px; }
  .vertical-scroll { height: 380px; }
  .vs-title { font-size: 28px; letter-spacing: 8px; }
  .vs-line { font-size: 24px; letter-spacing: 6px; }
  .detail-nav { padding: 0 20px; }
  .horiz-poem-block { padding: 24px 32px; }
  .content-sections { padding: 0 20px 60px; }
  .poem-nav-bottom { padding: 0 20px; }
  .filter-search { width: 100%; }
  .nav-controls { display: none; }
}

@media (max-width: 480px) {
  .hero-title { letter-spacing: 6px; }
  .catalog-grid { grid-template-columns: 1fr 1fr; }
}

/* ===== LOADING ===== */
.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s var(--ease);
}

.loading-screen.done {
  opacity: 0;
  pointer-events: none;
}

.loading-char {
  font-size: 64px;
  font-weight: 900;
  color: var(--ink);
  animation: loadPulse 1.2s ease-in-out infinite;
}

@keyframes loadPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.loading-text {
  font-size: 13px;
  color: var(--ink-faint);
  font-family: var(--sans);
  letter-spacing: 4px;
  margin-top: 16px;
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-char">詩</div>
  <div class="loading-text">載入中</div>
</div>

<div class="fn-tooltip" id="fnTooltip"></div>

<!-- ===== HERO ===== -->
<div class="hero" id="heroSection">
  <div class="hero-content">
    <div class="hero-ornament">◆ ◇ ◆</div>
    <h1 class="hero-title">積累與感興</h1>
    <p class="hero-subtitle">小學古詩文誦讀材料選編（修訂）</p>
    <div class="hero-divider"></div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num">100</div>
        <div class="hero-stat-label">篇詩文</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">47</div>
        <div class="hero-stat-label">位作者</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">跨越千年</div>
        <div class="hero-stat-label">秦至清</div>
      </div>
    </div>
    <button class="hero-cta" onclick="scrollToCatalog()">進 入 文 庫 ↓</button>
  </div>
  <div class="hero-scroll-hint">
    SCROLL
    <span style="font-size: 16px;">↓</span>
  </div>
</div>

<!-- ===== CATALOG ===== -->
<div class="catalog" id="catalogSection">
  <div class="catalog-header">
    <h2>詩 文 總 目</h2>
    <div class="line"></div>
    <p>教育局課程發展處 · 中國語文教育</p>
  </div>
  <div class="filter-bar">
    <input type="text" class="filter-search" id="searchInput" placeholder="搜索詩題、作者…" oninput="filterCatalog()">
  </div>
  <div class="catalog-grid" id="catalogGrid"></div>
</div>

<!-- ===== DETAIL VIEW ===== -->
<div class="detail-view" id="detailView">
  <nav class="detail-nav">
    <div class="detail-nav-inner">
      <button class="nav-back" onclick="closeDetail()">← 返回</button>
      <div class="nav-breadcrumb" id="breadcrumb"></div>
      <div class="nav-controls">
        <button class="nav-btn active" id="btnVert" onclick="setView('vert')">直排</button>
        <button class="nav-btn" id="btnHoriz" onclick="setView('horiz')">橫排</button>
      </div>
    </div>
  </nav>
  <div class="reading-area" id="readingArea"></div>
  <div class="poem-nav-bottom" id="poemNav"></div>
</div>

<script>
// ===== DATA =====
let POEMS = [];
const SECTION_META = [
  { key: 'author_bio', label: '作者簡介', icon: '01', special: false },
  { key: 'background', label: '背景資料', icon: '02', special: false },
  { key: 'annotations', label: '注釋', icon: '03', special: false },
  { key: 'analysis', label: '賞析重點', icon: '04', special: false },
  { key: 'follow_up', label: '跟進活動', icon: '◆', special: true },
  { key: 'think_questions', label: '想一想', icon: '◆', special: true },
];

// ===== INIT =====
async function init() {
  try {
    const resp = await fetch('output/poems.json');
    POEMS = await resp.json();
  } catch {
    try {
      const resp = await fetch('poems.json');
      POEMS = await resp.json();
    } catch (e) {
      console.error('Failed to load poems:', e);
      return;
    }
  }

  renderCatalog();
  document.getElementById('loading').classList.add('done');
}

// ===== CATALOG =====
function renderCatalog() {
  const grid = document.getElementById('catalogGrid');
  grid.innerHTML = POEMS.map(p => {
    const preview = p.verses.map(v => v.text).join('').slice(0, 30);
    return `
      <div class="poem-card" data-num="${p.num}" onclick="openDetail(${p.num})" style="animation-delay:${p.num * 15}ms">
        <div class="card-num">${String(p.num).padStart(3, '0')}</div>
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-author">${esc(p.author)}</div>
        <div class="card-preview">${esc(preview)}…</div>
      </div>`;
  }).join('');
}

function filterCatalog() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.poem-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';
  });
}

function scrollToCatalog() {
  document.getElementById('catalogSection').scrollIntoView({ behavior: 'smooth' });
}

// ===== DETAIL VIEW =====
function openDetail(num) {
  const poem = POEMS.find(p => p.num === num);
  if (!poem) return;

  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('catalogSection').style.display = 'none';
  document.getElementById('detailView').classList.add('active');

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `<span class="sep">${poem.num}.</span>${esc(poem.title)}<span class="sep">·</span><span class="author-name">${esc(poem.author)}</span>`;

  renderPoemContent(poem);
  renderPoemNav(poem);
  window.scrollTo(0, 0);
}

function closeDetail() {
  document.getElementById('heroSection').style.display = '';
  document.getElementById('catalogSection').style.display = '';
  document.getElementById('detailView').classList.remove('active');
  window.scrollTo(0, 0);
}

function renderPoemContent(poem) {
  const area = document.getElementById('readingArea');

  // Build verse lines for vertical/horizontal
  const verseLines = poem.verses.map(v => {
    let text = v.text;
    // Insert footnote refs from back to front
    const fns = [...v.footnotes].sort((a, b) => b.position - a.position);
    for (const fn of fns) {
      text = text.slice(0, fn.position + 1) + `<span class="fn-ref" data-fn="${fn.num}" onclick="showFootnote(event, ${poem.num}, ${fn.num})">^${fn.num}</span>` + text.slice(fn.position + 1);
    }
    return text;
  });

  // Vertical scroll
  const vsLines = verseLines.map(l => `<span class="vs-line">${l}</span>`).join('');

  // Horizontal
  const hzLines = verseLines.map(l => `<div class="hp-line">${l}</div>`).join('');

  // Sections
  let sectionsHtml = '';
  for (const meta of SECTION_META) {
    const content = poem.sections[meta.key];
    if (!content) continue;

    const formatted = meta.key === 'annotations'
      ? formatAnnotations(content)
      : formatParagraphs(content);

    sectionsHtml += `
      <div class="content-block" style="animation-delay:${SECTION_META.indexOf(meta) * 0.08}s">
        <div class="content-block-header">
          <span class="cb-num ${meta.special ? 'cb-special' : ''}">${meta.icon}</span>
          <h3>${meta.special ? '【' + meta.label + '】' : meta.label}</h3>
        </div>
        <div class="content-text">${formatted}</div>
      </div>`;
  }

  area.innerHTML = `
    <div class="poem-scroll-section" id="vertSection">
      <div class="vertical-scroll" id="vscroll">
        <span class="vs-title">${esc(poem.title)}</span>
        <span class="vs-author">${esc(poem.author)}</span>
        <div class="vs-body">${vsLines}</div>
        <div class="seal-stamp">${esc(poem.author ? poem.author.charAt(0) : '詩')}</div>
      </div>
    </div>
    <div class="horizontal-section" id="horizSection">
      <div class="horiz-poem-block">
        <div class="hp-title">${esc(poem.title)}</div>
        <div class="hp-author">${esc(poem.author)}</div>
        ${hzLines}
      </div>
    </div>
    <div class="content-sections">${sectionsHtml}</div>
  `;
}

function formatParagraphs(text) {
  const lines = text.split('\n').filter(l => l.trim());
  let paragraphs = [];
  let buf = [];
  for (const line of lines) {
    if (!line.trim()) {
      if (buf.length) { paragraphs.push(buf.join('')); buf = []; }
    } else {
      buf.push(line.trim());
    }
  }
  if (buf.length) paragraphs.push(buf.join(''));
  return paragraphs.map(p => `<p>${esc(p)}</p>`).join('');
}

function formatAnnotations(text) {
  // Split into numbered entries
  const parts = text.split(/(\d{1,2})\.\s*/);
  let html = '';
  // parts: [before?, num, content, num, content, ...]
  for (let i = 1; i < parts.length; i += 2) {
    const num = parts[i];
    const body = parts[i + 1]?.trim() || '';
    const colonIdx = body.indexOf('：');
    let term = '';
    let def = body;
    if (colonIdx >= 0) {
      term = body.slice(0, colonIdx);
      def = body.slice(colonIdx + 1);
    }
    html += `<div class="annotation-entry">
      <span class="ann-num">${num}.</span>
      <span class="ann-term">${esc(term)}：</span>
      <span class="ann-def">${esc(def)}</span>
    </div>`;
  }
  return html || `<p>${esc(text)}</p>`;
}

function renderPoemNav(poem) {
  const nav = document.getElementById('poemNav');
  const prev = POEMS.find(p => p.num === poem.num - 1);
  const next = POEMS.find(p => p.num === poem.num + 1);

  nav.innerHTML = `
    ${prev ? `<div class="poem-nav-btn" onclick="openDetail(${prev.num})">
      <div class="pn-label">← 上一篇</div>
      <div class="pn-title">${esc(prev.title)}</div>
    </div>` : '<div></div>'}
    ${next ? `<div class="poem-nav-btn next" onclick="openDetail(${next.num})">
      <div class="pn-label">下一篇 →</div>
      <div class="pn-title">${esc(next.title)}</div>
    </div>` : '<div></div>'}
  `;
}

// ===== VIEW TOGGLE =====
function setView(mode) {
  const vertBtn = document.getElementById('btnVert');
  const horizBtn = document.getElementById('btnHoriz');
  const vertSec = document.getElementById('vertSection');
  const horizSec = document.getElementById('horizSection');

  if (mode === 'vert') {
    vertBtn.classList.add('active');
    horizBtn.classList.remove('active');
    vertSec.classList.remove('hidden');
    horizSec.classList.remove('active');
  } else {
    horizBtn.classList.add('active');
    vertBtn.classList.remove('active');
    vertSec.classList.add('hidden');
    horizSec.classList.add('active');
  }
}

// ===== FOOTNOTE TOOLTIP =====
function showFootnote(event, poemNum, fnNum) {
  event.stopPropagation();
  const poem = POEMS.find(p => p.num === poemNum);
  if (!poem) return;

  const tooltip = document.getElementById('fnTooltip');

  // Find annotation text
  const annText = poem.sections.annotations || '';
  const regex = new RegExp(`${fnNum}\\.\\s*(.+?)(?=\\n\\d+\\.|$)`, 's');
  const match = annText.match(regex);
  const content = match ? match[1].trim() : '（注釋未找到）';

  tooltip.innerHTML = `<span class="fn-num">${fnNum}.</span> ${esc(content)}`;

  const rect = event.target.getBoundingClientRect();
  tooltip.style.left = Math.min(rect.left, window.innerWidth - 380) + 'px';
  tooltip.style.top = (rect.bottom + 8) + 'px';
  tooltip.classList.add('visible');

  setTimeout(() => {
    document.addEventListener('click', hideFootnote, { once: true });
  }, 10);
}

function hideFootnote() {
  document.getElementById('fnTooltip').classList.remove('visible');
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    const current = document.querySelector('.detail-view.active #breadcrumb');
    if (current) {
      const num = parseInt(current.textContent);
      if (num > 1) openDetail(num - 1);
    }
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    const current = document.querySelector('.detail-view.active #breadcrumb');
    if (current) {
      const num = parseInt(current.textContent);
      if (num < 100) openDetail(num + 1);
    }
  }
});

// ===== UTILS =====
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== START =====
init();
</script>
